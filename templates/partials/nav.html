<nav class="navbar">
  <div class="name-container">
    <a href="/" aria-label="Go to homepage">
      <h1>{{ config.title }}</h1>
    </a>
  </div>

  <button class="hamburger-menu" type="button" aria-expanded="false" aria-controls="mobile-menu" aria-label="Toggle navigation menu">
    <div class="hamburger" aria-hidden="true">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </button>

  <!-- DEVIL -->
  <div class="nav-devil" aria-hidden="true">
    <div class="devil-wrap">
      <img src="/seytan.png" alt="" class="devil-img" />
      <div class="pupil pupil-l"></div>
      <div class="pupil pupil-r"></div>
    </div>
  </div>

  {% if config.extra.nav_links %}
    <ul class="nav-links">
      {% for link in config.extra.nav_links %}
        <li><a href="{{ link.url }}">{{ link.name }}</a></li>
      {% endfor %}
    </ul>
  {% endif %}

  <div class="mobile-menu" id="mobile-menu" aria-hidden="true">
    <button class="mobile-menu-close" type="button" aria-label="Close navigation menu">&times;</button>
    <ul>
      <li><a href="/">Home</a></li>
      {% for item in config.extra.sidebar_categories %}
        <li><a href="{{ item.url | default(value="#") }}">{{ item.name }}</a></li>
      {% endfor %}
    </ul>
  </div>
</nav>
